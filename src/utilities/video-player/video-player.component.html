<div
    class="video-player"
    [style.height]="isMaximized ? '100vh' :
    camerasForPage === 2 ? '70vh' :
    camerasForPage === 6 ? '49.3vh' :
    camerasForPage === 9 ? '33vh' :
    camerasForPage === 12 ? '33vh' :
    '24.7vh'">
    <div class="eye-logo">
        <img src="assets/gif/loading-gif.gif" alt="" width="200" *ngIf="showLoader">
    </div>

    <video #video width="100%" height="100%" autoplay></video>
    <canvas #canvas [width]="canvasWidth" [height]="canvasHeight" class="d-none"></canvas>
</div>
