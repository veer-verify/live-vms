<div style="background-color: #084982;">
  <p class="dialog-title mb-2">Send Message</p>
</div>

<div class="dialog-content" style="width: 500px;">
  <div class="row mx-0 mt-2">
    <div class="col-lg-12">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Sender</mat-label>
        <input matInput type="text" [(ngModel)]="sender" disabled>
      </mat-form-field>
    </div>
    <div class="col-lg-12">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Recipient</mat-label>
        <input matInput type="text" [(ngModel)]="recipient" maxlength="15" required>
      </mat-form-field>
    </div>
    <div class="col-lg-12">
      <mat-form-field class="w-100">
        <mat-label>Message</mat-label>
        <textarea matInput [(ngModel)]="message"></textarea>
      </mat-form-field>
    </div>

    <div class="col-lg-12">
      <!-- <input type="file" (change)="selected800File($event)"> -->
       <img loading="lazy" [src]="env.guard_monitoring_url + '/download_1_0/' + data?.imageName |image |async" alt="Loading..." width="250px">
    </div>

    <div class="d-flex align-items-center justify-content-end mt-2">
      <button class="dialog-close-btn" mat-dialog-close>Close</button>
      <button class="dialog-update-btn" mat-dialog-close (click)="sendMessage()">Submit</button>
      <!-- <progress id="uploadProgress" [value]="progress" max="100" style="width: 100%;"></progress>
      <span id="progressText">{{progress}}%</span> -->
    </div>

  </div>
</div>
