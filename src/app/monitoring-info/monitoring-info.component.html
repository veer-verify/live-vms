  <div class="main-container">
   
    <p class="title" style="font-size: 22px; color: #3d3934; font-weight: 700;">MONITORING DASHBOARD</p>

      
    

    <!-- count -->
    <div class="d-flex my-2 justify-content-between align-items-center srch">
      <div class="d-flex">
        <div class=" d-flex justify-content-start">
          <div class="vl-blue"></div>
          <div class="mx-2">
            <div class="status">Total sites</div>
            <div class="count">{{showLoader ? '...' : count?.sitesCount}}</div>
          </div>
        </div>
        <div class=" d-flex justify-content-start">
          <div class="vl-green"></div>
          <div class="mx-2">
            <div class="status">Total cameras</div>
            <div class="count">{{showLoader ? '...' : count?.camerasCount}}</div>
          </div>
        </div>
      </div>


      <div class="d-flex align-items-baseline">
        <div class="mx-2">

          <button (click)="openTemplate()"  class="btn btn-sm text-light" style="background-color: #084982;" >Template</button>
        </div>
        <div class="me-2">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Site</mat-label>
            <input matInput #siteIdInput [matAutocomplete]="site" [(ngModel)]="siteName"
              (keyup)="searchSites($event); siteSearch1 = null">
            <button matSuffix mat-icon-button>
              <mat-icon>arrow_drop_down</mat-icon>
            </button>
            <mat-autocomplete #site="matAutocomplete">
              <mat-option [value]="null" (click)="siteSearch1 = null">All</mat-option>
              <mat-option *ngFor="let item of siteslist | search: siteSearch" [value]="item.siteId"
                (click)="this.siteSearch1 = item.siteName">{{ item.siteName }}</mat-option>
            </mat-autocomplete>
          </mat-form-field>
        </div>
        <div>
          <app-pagination [totalPages]="totalPages" (emitPage)="getPaginatedData($event)"></app-pagination>
        </div>
      </div>
    </div>

    <div class="mt-3">
      <app-table [fields]="fields" [data]="siteslist" [search]="siteSearch1" (childEvent)="handleChildEvent($event)"
        [showLoader]="showLoader"></app-table>
    </div>

    <ng-template #camera>
      <app-cameras [cameras]="cameraList" [details]="currentItem" (event)="checked"></app-cameras>
    </ng-template>

    <ng-template #monitoring>
      <app-monitoring-hours [monitoringCameras]="monitoringCameras" [details]="currentItem"></app-monitoring-hours>
    </ng-template>

    <ng-template #actionTag>
      <app-actiontag [cameralist]="cameraList" [monitoringCameras]="monitoringCameras" [details]="currentItem"></app-actiontag>
    </ng-template>

    <ng-template #action>
      <app-action-view [cameraList]="cameraList" [currentItem]="currentItem"></app-action-view>
    </ng-template>

    <ng-container *ngIf="isSidePanelOpen">
      <app-sidepanel [isSidePanelOpen]="isSidePanelOpen" (sidePanelClosed)="onCloseSidePanel($event)"
        [devicesList]="cameraList" [details]="currentItem"></app-sidepanel>
    </ng-container>

     <ng-container *ngIf="isSidePanelOpen1">
      <app-template [isSidePanelOpen]="isSidePanelOpen1" (sidePanelClosed)="onCloseSidePanel1($event)"
        [devicesList]="cameraList" [details]="currentItem"></app-template>
    </ng-container>

 
  </div>
