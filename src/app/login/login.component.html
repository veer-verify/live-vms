<div class="logo">
  <img [src]="storageSer.logo" width="200px">
</div>

<div class="signin-content">
  <mat-card>
    <mat-card-content>
      <p class="login-text text-center mb-3">welcome</p>

      <form [formGroup]="loginForm">
        <div class="row">
          <div class="col-12">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>User Name</mat-label>
              <input matInput formControlName="userName">
              <mat-error>Please enter your user name</mat-error>
            </mat-form-field>
          </div>

          <div class="col-12">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Password</mat-label>
              <input matInput [type]="showPassword ? 'text' : 'password'" formControlName="password">
              <mat-icon class="pointer mb-2" matSuffix (click)="togglePasswordVisibility()">{{ showPassword ?
                'visibility' : 'visibility_off' }}</mat-icon>
              <mat-error>Please enter your password</mat-error>
            </mat-form-field>
          </div>
        </div>

        <div class="d-flex justify-content-center">
          <button mat-raised-button color="primary" type="submit" class="w-25" (click)="login()">LOGIN</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>

<ng-container *ngIf="showLoader">
  <app-loader></app-loader>
</ng-container>
