<app-loader *ngIf="showLoader"></app-loader>


<div
  class="header d-flex justify-content-between align-items-center px-3">
  <div class="logo">
    <a><img loading="lazy" [src]="storageSer.getFile('logo-black.png')" width="150px"/></a>
  </div>

  <div class="user-detail">
    <button class="user-btn p-0" [matMenuTriggerFor]="beforeMenu" (menuOpened)="onMenuOpened()" (menuClosed)="onMenuClosed()">
      <img loading="lazy" [src]="storageSer.getFile('user.svg')" width="24px" />
    </button>

    <mat-menu #beforeMenu xPosition="before">
      <div class="profile">
        <div class="image">
          <div class="text-center">
            <img loading="lazy" src="assets/icons/user-black.svg" alt width="75px" />
          </div>
          <div class="p-2">
            <p>
              User:&nbsp;<span class="fw-bold">{{ userData?.UserName }}</span>
            </p>
            <p>
              Email:&nbsp;<span class="fw-bold">{{ userData?.email }}</span>
            </p>
          </div>
        </div>
        <div>
          <button
            class="w-100 py-2 btn"
            (click)="logout()"
          >
            Logout
          </button>
        </div>
      </div>
    </mat-menu>
  </div>
</div>
