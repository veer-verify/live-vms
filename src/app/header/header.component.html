<app-loader *ngIf="showLoader"></app-loader>


<div
  class="header d-flex justify-content-between align-items-center px-3"
  *ngIf="!isHidden"
>
  <div class="logo">
    <a><img [src]="storageSer.environment.logo" width="100%"/></a>
  </div>

  <div class="user-detail">
    <button class="user-btn p-0" [matMenuTriggerFor]="beforeMenu">
      <img src="assets\icons\profile.svg" width="36px" />
    </button>

    <mat-menu #beforeMenu="matMenu" xPosition="before">
      <div class="profile">
        <div class="image">
          <div class="text-center">
            <img src="assets/icons/user-black.svg" alt width="75px" />
          </div>
          <div class="p-2">
            <p>
              User:&nbsp;<span class="fw-bold">{{ userData?.UserName }}</span>
            </p>
            <p>
              Email:&nbsp;<span class="fw-bold">{{ userData?.email }}</span>
            </p>
          </div>
        </div>
        <div>
          <button
            class="w-100 py-2"
            style="background-color: #084982; border: none; color: #ffffff"
            (click)="logout()"
          >
            Logout
          </button>
        </div>
      </div>
    </mat-menu>
  </div>
</div>
