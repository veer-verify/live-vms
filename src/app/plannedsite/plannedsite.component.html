<ng-container *ngIf="currentItem.type=='add'">

  <div class="p-2">

    <div class="d-flex justify-content-between">
      <p>{{currentItem?.item.siteName}}</p>
      <p class="headingp">Planned Site Activity</p>
      <button class="closebtn" mat-dialog-close>×</button>

    </div>


  <form [formGroup]="myForm" (ngSubmit)="onSubmit()">

    <div class="row">

      <div class="col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Select PSA</mat-label>
          <mat-select formControlName="psaTagsId"  >
            <mat-option *ngFor="let item of psaTags" [value]="item.keyId" >
              {{ item.value }}
            </mat-option>
          </mat-select>
        </mat-form-field>

      </div>


      <div class="col-lg-6">
      <mat-form-field >
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description"></textarea>
      </mat-form-field>
      </div>


      <div class="col-lg-6">
        <label>From Date & Time</label>
        <input type="datetime-local" class="form-control" formControlName="fromDateTime">
      </div>

      <div class="col-lg-6">
        <label>To Date & Time</label>
        <input type="datetime-local" class="form-control" formControlName="toDateTime">
      </div>

    </div>

    <div class="d-flex justify-content-end">

      <button class="mt-3" type="submit" >
        Submit
      </button>
    </div>
  </form>
  </div>

</ng-container>

<ng-container *ngIf="currentItem.type=='view'">

<div class="p-2">

    <div class="d-flex justify-content-between">
      <p>{{currentItem?.item.siteName}}</p>
      <p class="headingp">Planned Site Activity</p>
      <button class="closebtn" mat-dialog-close>×</button>
    </div>

  </div>


  <app-table [fields]="fields" [data]="data" ></app-table>


</ng-container>
