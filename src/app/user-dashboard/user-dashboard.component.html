<app-header></app-header>
<app-loader *ngIf="storage_service.show_loader"></app-loader>

<div class="overall-container">
  <div [ngClass]="!showSidenav ? 'left-content' : 'left-content-active'">
    <!-- <button style="border: none;" class="colap-arr my-1" (click)="collap_nav()">
      <img [ngClass]="showSidenav ? 'forw':'backw'" src="assets/icons/arrow_back.svg" alt="" width="16"
        style="transition: all 300ms ease-in-out;" />
    </button> -->

    <div class="list-group">
      <a class="list-group-item" [routerLink]="['/user-dashboard/monitoring-info']" routerLinkActive="routeactive">
        <img src="assets/icons/grip.svg" />
        <span style="font-weight: 500">Dashboard</span>
      </a>

      <ng-container *ngIf="
          storage_service.isSuperAdmin() ||
          storage_service.isAdmin() ||
          storage_service.isFirstLevel()
        ">
        <a class="list-group-item" [routerLink]="['/dashboard']" routerLinkActive="routeactive">
          <img src="assets/icons/building.svg" />
          <span style="font-weight: 500">Sites</span>
        </a>
      </ng-container>

      <a class="list-group-item" [routerLink]="['/user-dashboard/alerts-info']" routerLinkActive="routeactive">
        <img src="assets/icons/bell.svg" />
        <span style="font-weight: 500">Alerts</span>
      </a>

      <a class="list-group-item " [routerLink]="['/user-dashboard/device-status']" routerLinkActive="routeactive">
        <img src="assets/icons/floppy-disk.svg">
        <span style="font-weight: 500;">Devices</span>
      </a>

      <ng-container
        *ngIf="storage_service.isSuperAdmin() || storage_service.isAdmin() || storage_service.isSecondLevel()">
        <a class="list-group-item" [routerLink]="['/user-dashboard/events']" routerLinkActive="routeactive">
          <img src="assets/icons/magnifying-glass.svg">
          <span style="font-weight: 500;">Reviewer</span>
        </a>
      </ng-container>

      <ng-container
        *ngIf="storage_service.isSuperAdmin() || storage_service.isAdmin() || storage_service.isThirdLevel()">
        <a class="list-group-item" [routerLink]="['/user-dashboard/third-level']" routerLinkActive="routeactive">
          <img src="assets/icons/truck-ramp-box.svg">
          <span style="font-weight: 500;">Dispatcher</span>
        </a>
      </ng-container>
    </div>
  </div>

  <div class="main-container">
    <router-outlet></router-outlet>
  </div>
</div>
